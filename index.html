<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkForce HR</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --bg:#fafaf9;--bg2:#f4f3f0;--bg3:#eceae4;--surface:#fff;
    --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
    --text:#1a1a18;--text2:#6b6b67;--text3:#9b9b96;
    --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#0C447C;
    --green:#3B6D11;--green-bg:#EAF3DE;--green-text:#27500A;
    --amber-bg:#FAEEDA;--amber-text:#633806;
    --red:#A32D2D;--red-bg:#FCEBEB;--red-text:#791F1F;
    --gray-bg:#F1EFE8;--gray-text:#444441;
    --radius:8px;--radius-lg:12px;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#1a1a18;--bg2:#222220;--bg3:#2a2a27;--surface:#222220;
      --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);
      --text:#f0ede8;--text2:#a0a09b;--text3:#606058;
      --blue-bg:#0c2a45;--blue-text:#85B7EB;
      --green-bg:#172b08;--green-text:#97C459;
      --amber-bg:#2e1f05;--amber-text:#FAC775;
      --red-bg:#2a1010;--red-text:#F09595;
      --gray-bg:#2c2c2a;--gray-text:#D3D1C7;
    }
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}

  /* ── AUTH SCREEN ── */
  .auth-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg2);padding:16px;}
  .auth-box{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:36px 32px;width:380px;max-width:100%;}
  .auth-box h1{font-size:20px;font-weight:700;letter-spacing:-0.03em;margin-bottom:4px;}
  .auth-box .sub{font-size:13px;color:var(--text2);margin-bottom:24px;}
  .auth-box .form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
  .auth-box label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;}
  .auth-box input{padding:9px 11px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;transition:border-color .1s;}
  .auth-box input:focus{outline:none;border-color:var(--blue);}
  .auth-box .btn-full{width:100%;padding:10px;border:none;border-radius:var(--radius);background:var(--blue);color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:background .1s;font-family:inherit;}
  .auth-box .btn-full:hover{background:var(--blue-text);}
  .auth-box .btn-full:disabled{opacity:.5;cursor:not-allowed;}
  .auth-toggle{text-align:center;margin-top:16px;font-size:13px;color:var(--text2);}
  .auth-toggle a{color:var(--blue);cursor:pointer;text-decoration:none;}
  .auth-toggle a:hover{text-decoration:underline;}
  .auth-error{background:var(--red-bg);color:var(--red-text);border:0.5px solid var(--red-text);border-radius:var(--radius);padding:8px 12px;font-size:13px;margin-bottom:14px;}
  .auth-info{background:var(--green-bg);color:var(--green-text);border:0.5px solid var(--green-text);border-radius:var(--radius);padding:8px 12px;font-size:13px;margin-bottom:14px;}

  /* ── LAYOUT ── */
  .app{display:flex;height:100vh;overflow:hidden;}
  .sidebar{width:210px;min-width:210px;background:var(--bg2);border-right:0.5px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
  .logo{padding:18px 16px 14px;border-bottom:0.5px solid var(--border);}
  .logo h1{font-size:16px;font-weight:600;letter-spacing:-.02em;}
  .logo p{font-size:11px;color:var(--text2);margin-top:2px;}
  .nav-section{padding:10px 0 4px;}
  .nav-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);padding:0 16px 4px;}
  .nav-item{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;font-size:13px;color:var(--text2);border-left:2px solid transparent;transition:all .12s;user-select:none;}
  .nav-item:hover{background:var(--bg3);color:var(--text);}
  .nav-item.active{background:var(--surface);color:var(--text);border-left-color:var(--blue);font-weight:500;}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .topbar{padding:12px 20px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);flex-shrink:0;}
  .topbar h2{font-size:15px;font-weight:600;}
  .topbar-right{display:flex;gap:8px;align-items:center;}
  .content{padding:20px;overflow-y:auto;flex:1;}

  /* ── BUTTONS ── */
  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--surface);cursor:pointer;font-size:13px;color:var(--text);transition:background .1s,opacity .1s;font-family:inherit;white-space:nowrap;}
  .btn:hover{background:var(--bg2);}
  .btn.primary{background:var(--blue);color:#fff;border-color:var(--blue);}
  .btn.primary:hover{background:var(--blue-text);}
  .btn.success{background:var(--green);color:#fff;border-color:var(--green);}
  .btn.success:hover{background:var(--green-text);}
  .btn.danger{color:var(--red);border-color:rgba(163,45,45,.3);background:transparent;}
  .btn.danger:hover{background:var(--red-bg);}
  .btn.sm{padding:4px 9px;font-size:12px;}
  .btn:disabled{opacity:.45;cursor:not-allowed;}

  /* ── VIEWER BADGE ── */
  .role-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;}
  .role-admin{background:var(--blue-bg);color:var(--blue-text);}
  .role-viewer{background:var(--gray-bg);color:var(--gray-text);}
  .viewer-bar{background:var(--amber-bg);color:var(--amber-text);padding:7px 20px;font-size:12px;text-align:center;border-bottom:0.5px solid var(--amber-text);flex-shrink:0;}

  /* ── STATS ── */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px;}
  .stat-card{background:var(--bg2);border-radius:var(--radius);padding:14px 16px;}
  .stat-card .lbl{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}
  .stat-card .val{font-size:22px;font-weight:600;letter-spacing:-.03em;}

  /* ── TABLE ── */
  .table-wrap{border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{background:var(--bg2);padding:9px 12px;text-align:left;font-weight:500;font-size:11px;color:var(--text2);border-bottom:0.5px solid var(--border);white-space:nowrap;}
  td{padding:10px 12px;border-bottom:0.5px solid var(--border);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr.clickable:hover td{background:var(--bg2);cursor:pointer;}
  tfoot td{border-bottom:none;border-top:1.5px solid var(--border2);}

  /* ── BADGES ── */
  .badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:500;}
  .badge-blue{background:var(--blue-bg);color:var(--blue-text);}
  .badge-green{background:var(--green-bg);color:var(--green-text);}
  .badge-amber{background:var(--amber-bg);color:var(--amber-text);}
  .badge-red{background:var(--red-bg);color:var(--red-text);}
  .badge-gray{background:var(--gray-bg);color:var(--gray-text);}

  /* ── MODAL ── */
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;}
  .modal{background:var(--surface);border-radius:var(--radius-lg);border:0.5px solid var(--border);padding:24px;width:560px;max-width:100%;max-height:90vh;overflow-y:auto;}
  .modal h3{font-size:15px;font-weight:600;margin-bottom:18px;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .form-group{display:flex;flex-direction:column;gap:5px;}
  .form-group.full{grid-column:1/-1;}
  .form-group label{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;}
  .form-group input,.form-group select,.form-group textarea{padding:8px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;font-family:inherit;transition:border-color .1s;}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--blue);}
  .form-group textarea{resize:vertical;min-height:64px;}
  .modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:0.5px solid var(--border);}
  .modal-footer-split{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:16px;border-top:0.5px solid var(--border);}

  /* ── FILTERS ── */
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .filters input,.filters select{padding:7px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:13px;font-family:inherit;}
  .filters input{flex:1;min-width:160px;}

  /* ── GROUP CARDS ── */
  .group-card{border:0.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:14px;overflow:hidden;}
  .group-header{padding:13px 16px;background:var(--bg2);display:flex;align-items:center;justify-content:space-between;}
  .group-header strong{font-size:14px;}
  .group-header .meta{font-size:12px;color:var(--text2);margin-left:10px;}
  .group-member{padding:10px 16px;border-top:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:13px;gap:12px;}

  /* ── TASKS ── */
  .task-item{border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px 16px;display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;background:var(--surface);}
  .task-item.done{opacity:.5;}
  .task-check{width:18px;height:18px;border:1.5px solid var(--border2);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all .15s;}
  .task-check.checked{background:var(--green);border-color:var(--green);}
  .task-body{flex:1;min-width:0;}
  .task-title{font-size:13px;font-weight:500;}
  .task-item.done .task-title{text-decoration:line-through;}
  .task-meta{font-size:12px;color:var(--text2);margin-top:4px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  .reminder-chip{font-size:11px;padding:2px 7px;border-radius:999px;background:var(--amber-bg);color:var(--amber-text);}
  .overdue{color:var(--red-text)!important;}

  /* ── MISC ── */
  .avatar{width:28px;height:28px;border-radius:50%;background:var(--blue-bg);color:var(--blue-text);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}
  .empty-state{text-align:center;padding:56px 24px;color:var(--text2);}
  .empty-state .eicon{font-size:36px;margin-bottom:10px;}
  .spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-overlay{display:flex;align-items:center;justify-content:center;padding:60px;}

  /* ── USER MGMT ── */
  .user-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid var(--border);}
  .user-row:last-child{border-bottom:none;}
</style>
</head>
<body>

<!-- Auth screen shown before login -->
<div id="auth-screen" style="display:none">
  <div class="auth-wrap">
    <div class="auth-box">
      <h1>WorkForce HR</h1>
      <p class="sub" id="auth-sub">Sign in to your account</p>
      <div id="auth-msg"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="auth-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group" id="auth-name-wrap" style="display:none">
        <label>Full Name</label>
        <input type="text" id="auth-name" placeholder="Jane Doe">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-full" id="auth-btn" onclick="authSubmit()">Sign In</button>
      <div class="auth-toggle">
        <span id="auth-toggle-text">Don't have an account?</span>
        <a onclick="toggleAuthMode()"> <span id="auth-toggle-link">Sign up</span></a>
      </div>
    </div>
  </div>
</div>

<!-- Main app (hidden until logged in) -->
<div id="app-screen" style="display:none">
  <div class="app">
    <div class="sidebar">
      <div class="logo">
        <h1>WorkForce</h1>
        <p>HR Management</p>
      </div>
      <div class="nav-section">
        <div class="nav-label">Database</div>
        <div class="nav-item active" id="nav-employees" onclick="showView('employees')">👥 Employees</div>
        <div class="nav-item" id="nav-branches" onclick="showView('branches')">🏢 Branches</div>
        <div class="nav-item" id="nav-llc" onclick="showView('llc')">💼 LLC Groups</div>
        <div class="nav-item" id="nav-tasks" onclick="showView('tasks')">✅ Tasks</div>
        <div class="nav-item" id="nav-summary" onclick="showView('summary')">📊 Payroll Summary</div>
        <div class="nav-item" id="nav-users" style="display:none" onclick="showView('users')">👤 Users</div>
      </div>
      <div style="margin-top:auto;padding:12px 16px;border-top:0.5px solid var(--border);">
        <div id="sidebar-user" style="font-size:12px;color:var(--text2);margin-bottom:8px;"></div>
        <button class="btn sm" style="width:100%;justify-content:center" onclick="signOut()">🚪 Sign Out</button>
      </div>
    </div>
    <div class="main">
      <div id="viewer-bar" style="display:none" class="viewer-bar">👁 View only — contact an admin to make changes</div>
      <div id="main-content" style="display:contents"></div>
    </div>
  </div>
</div>

<div id="modal-root"></div>

<script>
// ─── SUPABASE ──────────────────────────────────────────────────────────────────
const sbUrl = 'https://reetcnucjmuffkpucrki.supabase.co';
const sbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJlZXRjbnVjam11ZmZrcHVjcmtpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMzc4MTUsImV4cCI6MjA5NjcxMzgxNX0.UvEHPlyaT7s9vYN8KTuvvQlG8yoBgf_K4JlowiZ5XXE';
const sb = supabase.createClient(sbUrl, sbKey);

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentUser = null;
let currentRole = 'viewer'; // 'admin' | 'viewer'
let authMode = 'signin'; // 'signin' | 'signup'

let state = {
  view: 'employees',
  employees: [], branches: [], tasks: [], users: [],
  loading: false, empFilter: '', branchFilter: '', taskFilter: 'all',
};

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const isAdmin = () => currentRole === 'admin';
const initials = n => (n||'?').split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2);
const fmtMoney = n => '$'+(+n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
function biWeeklyPay(e) {
  if (e.pay_type === 'salary') return (+e.salary||0) / 2.17;
  return (+e.wage||0) * (+e.hours||0) * 2;
}
const todayStr = () => new Date().toISOString().slice(0,10);
const isOverdue = d => d && d < todayStr();
const branchName = id => { const b=state.branches.find(x=>x.id===id); return b?b.name:'—'; };

// ─── AUTH ─────────────────────────────────────────────────────────────────────
function toggleAuthMode() {
  authMode = authMode === 'signin' ? 'signup' : 'signin';
  const isSignup = authMode === 'signup';
  document.getElementById('auth-sub').textContent = isSignup ? 'Create your account' : 'Sign in to your account';
  document.getElementById('auth-btn').textContent = isSignup ? 'Sign Up' : 'Sign In';
  document.getElementById('auth-toggle-text').textContent = isSignup ? 'Already have an account?' : "Don't have an account?";
  document.getElementById('auth-toggle-link').textContent = isSignup ? 'Sign in' : 'Sign up';
  document.getElementById('auth-name-wrap').style.display = isSignup ? '' : 'none';
  document.getElementById('auth-msg').innerHTML = '';
}

function showAuthMsg(msg, type='error') {
  document.getElementById('auth-msg').innerHTML =
    `<div class="${type==='error'?'auth-error':'auth-info'}">${msg}</div>`;
}

async function authSubmit() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const name = document.getElementById('auth-name')?.value.trim();
  if (!email || !password) { showAuthMsg('Please fill in all fields.'); return; }
  const btn = document.getElementById('auth-btn');
  btn.disabled = true;
  btn.textContent = authMode === 'signin' ? 'Signing in…' : 'Creating account…';
  document.getElementById('auth-msg').innerHTML = '';

  try {
    if (authMode === 'signup') {
      const { error } = await sb.auth.signUp({
        email, password,
        options: { data: { full_name: name } }
      });
      if (error) throw error;
      showAuthMsg('Account created! You can now sign in. An admin will need to approve your access level.', 'info');
      authMode = 'signin';
      toggleAuthMode();
    } else {
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
      await onSignedIn(data.user);
    }
  } catch(e) {
    showAuthMsg(e.message || 'Something went wrong.');
  }
  btn.disabled = false;
  btn.textContent = authMode === 'signin' ? 'Sign In' : 'Sign Up';
}

async function onSignedIn(user) {
  currentUser = user;
  // Fetch role
  const { data: roleData } = await sb.from('user_roles').select('role').eq('user_id', user.id).maybeSingle();
  currentRole = roleData?.role || 'viewer';

  // Update sidebar
  const email = user.email || '';
  const name = user.user_metadata?.full_name || email.split('@')[0];
  document.getElementById('sidebar-user').innerHTML =
    `<div style="font-weight:500;margin-bottom:4px">${name}</div>
     <span class="role-badge ${isAdmin()?'role-admin':'role-viewer'}">${isAdmin()?'⚡ Admin':'👁 Viewer'}</span>`;

  // Show users tab only to admins
  document.getElementById('nav-users').style.display = isAdmin() ? '' : 'none';
  // Show viewer bar to viewers
  document.getElementById('viewer-bar').style.display = isAdmin() ? 'none' : '';

  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = '';
  await loadAll();
}

async function signOut() {
  await sb.auth.signOut();
  currentUser = null; currentRole = 'viewer';
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('auth-screen').style.display = '';
  document.getElementById('auth-msg').innerHTML = '';
}

// ─── DATA ─────────────────────────────────────────────────────────────────────
async function loadAll() {
  state.loading = true; render();
  const [bRes, eRes, tRes] = await Promise.all([
    sb.from('branches').select('*').order('name'),
    sb.from('employees').select('*').order('name'),
    sb.from('tasks').select('*').order('created_at'),
  ]);
  state.branches = bRes.data||[];
  state.employees = eRes.data||[];
  state.tasks = tRes.data||[];

  if (isAdmin()) {
    const { data: uData } = await sb.from('user_roles').select('user_id, role');
    const { data: { users: authUsers } = {} } = await sb.auth.admin?.listUsers?.() || {};
    state.users = uData || [];
    state._authUsers = authUsers || [];
  }

  state.loading = false; render();
}

async function dbInsert(table, data) {
  const { data:d, error } = await sb.from(table).insert(data).select().single();
  if (error) throw error; return d;
}
async function dbUpdate(table, id, data) {
  const { error } = await sb.from(table).update(data).eq('id', id);
  if (error) throw error;
}
async function dbDelete(table, id) {
  const { error } = await sb.from(table).delete().eq('id', id);
  if (error) throw error;
}

// ─── ROUTING ─────────────────────────────────────────────────────────────────
function showView(v) {
  state.view = v;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const el = document.getElementById('nav-'+v);
  if (el) el.classList.add('active');
  render();
}

function render() {
  const mc = document.getElementById('main-content');
  if (state.loading) { mc.innerHTML=`<div style="display:flex;flex-direction:column;flex:1"><div class="loading-overlay"><div class="spinner"></div></div></div>`; return; }
  if (state.view==='employees') renderEmployees(mc);
  else if (state.view==='branches') renderBranches(mc);
  else if (state.view==='llc') renderLLC(mc);
  else if (state.view==='tasks') renderTasks(mc);
  else if (state.view==='summary') renderSummary(mc);
  else if (state.view==='users') renderUsers(mc);
}

// ─── EMPLOYEES ───────────────────────────────────────────────────────────────
function renderEmployees(mc) {
  const f=state.empFilter.toLowerCase(), bf=state.branchFilter;
  const filtered=state.employees.filter(e=>
    (!f||e.name.toLowerCase().includes(f)||(e.role||'').toLowerCase().includes(f))&&
    (!bf||e.branch_id===bf)
  );
  const totalPayroll=filtered.reduce((s,e)=>s+biWeeklyPay(e),0);

  mc.innerHTML=`

  mc.innerHTML=`
    <div style="display:flex;flex-direction:column;flex:1;overflow:hidden">

async function changeUserRole(userId, newRole) {
  try {
    const { error } = await sb.from('user_roles').update({role: newRole}).eq('user_id', userId);
    if (error) throw error;
    const u = state.users.find(x=>x.user_id===userId);
    if (u) u.role = newRole;
    render();
  } catch(e) { alert('Error: '+e.message); }
}

async function saveEmployee() {
  const name=document.getElementById('f-name').value.trim();
  if (!name){alert('Name is required.');return;}
  const btn=document.getElementById('save-emp-btn');
  btn.disabled=true;btn.textContent='Saving…';
  const docs=document.getElementById('f-docs').value.split(',').map(d=>d.trim()).filter(Boolean);
  try {
    const row=await dbInsert('employees',{
      name,
      role:document.getElementById('f-role').value.trim()||null,
      branch_id:document.getElementById('f-branch').value||null,
      llc:document.getElementById('f-llc').value.trim()||null,
      pay_type:document.getElementById('f-paytype').value,
      wage:parseFloat(document.getElementById('f-wage').value)||0,
      hours:parseFloat(document.getElementById('f-hours').value)||0,
      salary:parseFloat(document.getElementById('f-salary').value)||0,
      start_date:document.getElementById('f-start').value||null,
      status:document.getElementById('f-status').value,
      docs,
      notes:document.getElementById('f-notes').value.trim()||null
    });
    state.employees.push(row);state.employees.sort((a,b)=>a.name.localeCompare(b.name));
    closeModal();render();
  } catch(e){alert('Error: '+e.message);btn.disabled=false;btn.textContent='Save Employee';}
}

async function updateEmployee(id) {
  const name=document.getElementById('e-name').value.trim();
  if (!name){alert('Name required.');return;}
  const btn=document.getElementById('upd-emp-btn');btn.disabled=true;btn.textContent='Saving…';
  const docs=document.getElementById('e-docs').value.split(',').map(d=>d.trim()).filter(Boolean);
  try {
    const update={
      name,
      role:document.getElementById('e-role').value.trim()||null,
      branch_id:document.getElementById('e-branch').value||null,
      llc:document.getElementById('e-llc').value.trim()||null,
      pay_type:document.getElementById('e-paytype').value,
      wage:parseFloat(document.getElementById('e-wage').value)||0,
      hours:parseFloat(document.getElementById('e-hours').value)||0,
      salary:parseFloat(document.getElementById('e-salary').value)||0,
      start_date:document.getElementById('e-start').value||null,
      status:document.getElementById('e-status').value,
      docs,
      notes:document.getElementById('e-notes').value.trim()||null
    };
    await dbUpdate('employees',id,update);
    const idx=state.employees.findIndex(x=>x.id===id);
    if(idx!==-1)state.employees[idx]={...state.employees[idx],...update};
    closeModal();render();
  } catch(e){alert('Error: '+e.message);btn.disabled=false;btn.textContent='Save Changes';}
}

async function deleteEmployee(id,name) {
  if(!confirm(`Delete employee "${name}"? This cannot be undone.`))return;
  try{await dbDelete('employees',id);state.employees=state.employees.filter(e=>e.id!==id);closeModal();render();}
  catch(e){alert('Error: '+e.message);}
}

// ─── BRANCH CRUD ──────────────────────────────────────────────────────────────
function openAddBranch() {
  if (!isAdmin()) return;
  showModal(`
    <h3>Add Branch</h3>
    <div class="form-grid">
      <div class="form-group full"><label>Branch Name</label><input id="b-name" placeholder="e.g. Eastside" autofocus></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" id="save-br-btn" onclick="saveBranch()">Add Branch</button>
    </div>`);
}
async function saveBranch() {
  const name=document.getElementById('b-name').value.trim();if(!name){alert('Name required');return;}
  const btn=document.getElementById('save-br-btn');btn.disabled=true;btn.textContent='Saving…';
  try{const row=await dbInsert('branches',{name});state.branches.push(row);state.branches.sort((a,b)=>a.name.localeCompare(b.name));closeModal();render();}
  catch(e){alert('Error: '+e.message);btn.disabled=false;btn.textContent='Add Branch';}
}
async function deleteBranch(id,name) {
  if(state.employees.some(e=>e.branch_id===id)){alert(`Cannot delete "${name}" — employees are still assigned to it.`);return;}
  if(!confirm(`Delete branch "${name}"?`))return;
  try{await dbDelete('branches',id);state.branches=state.branches.filter(b=>b.id!==id);render();}
  catch(e){alert('Error: '+e.message);}
}

// ─── TASK CRUD ────────────────────────────────────────────────────────────────
function openAddTask() {
  if (!isAdmin()) return;
  showModal(`
    <h3>Add Task</h3>
    <div class="form-grid">
      <div class="form-group full"><label>Task Title *</label><input id="t-title" placeholder="e.g. Collect W-4 from…" autofocus></div>
      <div class="form-group full"><label>Linked Employee</label>
        <select id="t-emp"><option value="">— Not linked —</option>${state.employees.map(e=>`<option value="${e.id}">${e.name} (${branchName(e.branch_id)})</option>`).join('')}</select>
      </div>
      <div class="form-group"><label>Due Date</label><input id="t-due" type="date"></div>
      <div class="form-group"><label>Reminder Date</label><input id="t-reminder" type="date"></div>
      <div class="form-group full"><label>Priority</label><select id="t-priority"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option></select></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" id="save-task-btn" onclick="saveTask()">Add Task</button>
    </div>`);
}
async function saveTask() {
  const title=document.getElementById('t-title').value.trim();if(!title){alert('Title required');return;}
  const btn=document.getElementById('save-task-btn');btn.disabled=true;btn.textContent='Saving…';
  try{const row=await dbInsert('tasks',{title,employee_id:document.getElementById('t-emp').value||null,due_date:document.getElementById('t-due').value||null,reminder_date:document.getElementById('t-reminder').value||null,priority:document.getElementById('t-priority').value,done:false});state.tasks.push(row);closeModal();render();}
  catch(e){alert('Error: '+e.message);btn.disabled=false;btn.textContent='Add Task';}
}
async function toggleTask(id,newDone) {
  if (!isAdmin()) return;
  try{await dbUpdate('tasks',id,{done:newDone,done_at:newDone?new Date().toISOString():null});const t=state.tasks.find(x=>x.id===id);if(t){t.done=newDone;t.done_at=newDone?new Date().toISOString():null;}render();}
  catch(e){alert('Error: '+e.message);}
}
async function deleteTask(id) {
  if(!confirm('Delete this task?'))return;
  try{await dbDelete('tasks',id);state.tasks=state.tasks.filter(t=>t.id!==id);render();}
  catch(e){alert('Error: '+e.message);}
}

// ─── EXCEL EXPORT ─────────────────────────────────────────────────────────────
function exportExcel() {
  const wb=XLSX.utils.book_new();
  const empRows = [['ID','Name','Role','Branch','LLC','Pay Type','Hourly Wage ($)','Hours/Week','Monthly Salary ($)','Bi-Weekly Total ($)','Documents','Start Date','Status','Notes']];
  state.employees.forEach(e=>{const docs=Array.isArray(e.docs)?e.docs.join(', '):'';empRows.push([e.id,e.name,e.role||'',branchName(e.branch_id),e.llc||'',e.pay_type||'hourly',+(+e.wage||0).toFixed(2),+(+e.hours||0),+(+e.salary||0).toFixed(2),+biWeeklyPay(e).toFixed(2),docs,e.start_date||'',e.status||'',e.notes||'']);});
  const wsE=XLSX.utils.aoa_to_sheet(empRows);wsE['!cols']=[10,22,14,14,18,14,12,16,28,12,10,24].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb,wsE,'Employees');
  const brRows=[['Branch','Employees','Bi-Weekly Payroll ($)']];
  state.branches.forEach(b=>{const emps=state.employees.filter(e=>e.branch_id===b.id);brRows.push([b.name,emps.length,+emps.reduce((s,e)=>s+biWeeklyPay(e),0).toFixed(2)]);});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(brRows),'Branches');
  const llcMap={};state.employees.forEach(e=>{const k=e.llc||'No LLC';if(!llcMap[k])llcMap[k]=[];llcMap[k].push(e);});
  const llcRows=[['LLC','Employee','Role','Branch','Bi-Weekly Wage ($)']];
  Object.entries(llcMap).forEach(([llc,emps])=>emps.forEach(e=>llcRows.push([llc,e.name,e.role||'',branchName(e.branch_id),+biWeeklyPay(e).toFixed(2)])));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(llcRows),'LLC Groups');
  const summaryRows=[['Name','Branch','Pay Type','Rate','Bi-Weekly Pay ($)']];
  [...state.employees].sort((a,b)=>a.name.localeCompare(b.name)).forEach(e=>{
    const rate = e.pay_type==='salary' ? `${(+e.salary||0).toFixed(2)}/mo` : `${(+e.wage||0).toFixed(2)}/hr, ${e.hours||0}h/wk`;
    summaryRows.push([e.name, branchName(e.branch_id), e.pay_type==='salary'?'Salary':'Hourly', rate, +biWeeklyPay(e).toFixed(2)]);
  });
  summaryRows.push(['', '', '', 'TOTAL', +state.employees.reduce((s,e)=>s+biWeeklyPay(e),0).toFixed(2)]);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(summaryRows),'Payroll Summary');
  const tRows=[['Title','Employee','Branch','Due Date','Reminder','Priority','Status','Completed At']];
  state.tasks.forEach(t=>{const emp=state.employees.find(e=>e.id===t.employee_id);tRows.push([t.title,emp?emp.name:'—',emp?branchName(emp.branch_id):'—',t.due_date||'',t.reminder_date||'',t.priority,t.done?'Done':'Pending',t.done_at||'']);});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(tRows),'Tasks');
  XLSX.writeFile(wb,`workforce_export_${todayStr()}.xlsx`);
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function showModal(html){document.getElementById('modal-root').innerHTML=`<div class="modal-backdrop" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;}
function closeModal(){document.getElementById('modal-root').innerHTML='';}

// ─── INIT ─────────────────────────────────────────────────────────────────────
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) {
    await onSignedIn(session.user);
  } else {
    document.getElementById('auth-screen').style.display = '';
  }

  // Keep session in sync across tabs
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session?.user) {
      await onSignedIn(session.user);
    } else if (event === 'SIGNED_OUT') {
      document.getElementById('app-screen').style.display = 'none';
      document.getElementById('auth-screen').style.display = '';
    }
  });

  // Enter key on auth form
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('auth-screen').style.display !== 'none') authSubmit();
  });
})();
</script>
